site_name: The 52-Week Culinary Project
site_description: A 52-week home culinary school for the cook who already cooks.
site_url: https://culinary-projects.github.io/The-52-Week-Culinary-Project/
repo_url: https://github.com/Culinary-Projects/The-52-Week-Culinary-Project
repo_name: Culinary-Projects/The-52-Week-Culinary-Project

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - offline
  - glightbox

extra_javascript:
  - javascripts/giscus.js

